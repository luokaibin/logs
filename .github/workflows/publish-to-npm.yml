name: Publish to npm

# 当在 GitHub 上发布一个新的 Release 时，此工作流会自动运行
on:
  release:
    types: [published]

jobs:
  publish-to-npm:
    runs-on: ubuntu-latest
    # 关键：添加权限以允许 OIDC 身份验证
    permissions:
      id-token: write
      contents: read
    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.6.5 # 与 packageManager 字段保持一致

      # 3. 设置 Node.js 环境，并启用 pnpm 缓存
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'pnpm'

      # 4. 安装依赖项
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. 执行构建脚本 (在 logs 目录内)
      - name: Build project
        run: pnpm run build
        working-directory: ./logs

      # 6. 发布到 npm (在 logs 目录内)
      - name: Publish to npm
        # 关键：不再需要使用 secrets.NPM_TOKEN
        # npm CLI (11.5.1+) 会自动检测 OIDC 环境进行发布
        run: pnpm publish --no-git-checks --access public
        working-directory: ./logs